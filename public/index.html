<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILI-HUB — Đăng nhập</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="seal seal-large">
      <span class="seal-mono">MH</span>
    </div>
    <h1 class="auth-title">MILI-HUB</h1>
    <div class="auth-slogan">MỘT CHẠM KẾT NỐI — TRỌN VẸN MÙA QUÂN SỰ</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" type="button">Đăng nhập</button>
      <button class="auth-tab" id="tab-register" type="button">Đăng ký</button>
    </div>

    <div id="alert-box"></div>

    <!-- FORM ĐĂNG NHẬP -->
    <form class="auth-form" id="form-login">
      <div class="field">
        <label for="login-username">Tên đăng nhập</label>
        <input type="text" id="login-username" required autocomplete="username">
      </div>
      <div class="field">
        <label for="login-password">Mật khẩu</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
    
      <p class="hint mt-2"><a href="#" id="link-forgot-password">Quên mật khẩu?</a></p>

      <p class="hint mt-2">Hoặc đăng nhập không cần đăng ký:</p>
      <div class="field-row">
        <button type="button" class="btn btn-outline" id="btn-demo-student">Xem thử với vai trò Sinh viên</button>
        <button type="button" class="btn btn-outline" id="btn-demo-admin">Xem thử với vai trò Ban quản lý</button>
      </div>
    </form>
    <!-- FORM QUÊN MẬT KHẨU -->
    <form class="auth-form hidden" id="form-forgot">
      <p class="hint mb-2">Nhập tên đăng nhập và số điện thoại đã đăng ký để đặt lại mật khẩu mới.</p>
      <div class="field">
        <label for="forgot-username">Tên đăng nhập</label>
        <input type="text" id="forgot-username" required autocomplete="username">
      </div>
      <div class="field">
        <label for="forgot-phone">Số điện thoại đã đăng ký</label>
        <input type="tel" id="forgot-phone" required>
      </div>
      <div class="field">
        <label for="forgot-new-password">Mật khẩu mới</label>
        <input type="password" id="forgot-new-password" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="forgot-confirm-password">Nhập lại mật khẩu mới</label>
        <input type="password" id="forgot-confirm-password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Đặt lại mật khẩu</button>
      <p class="hint mt-2"><a href="#" id="link-back-to-login">&larr; Quay lại đăng nhập</a></p>
    </form>


    <!-- FORM ĐĂNG KÝ -->
    <form class="auth-form hidden" id="form-register">
      <div class="field">
        <label for="reg-fullname">Họ và tên</label>
        <input type="text" id="reg-fullname" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="reg-username">Tên đăng nhập</label>
          <input type="text" id="reg-username" required>
        </div>
        <div class="field">
          <label for="reg-password">Mật khẩu</label>
          <input type="password" id="reg-password" required minlength="6">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="reg-company">Đại đội</label>
          <input type="text" id="reg-company" placeholder="VD: 1" required>
        </div>
        <div class="field">
          <label for="reg-platoon">Trung đội</label>
          <input type="text" id="reg-platoon" placeholder="VD: 75DCTT21" required>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="reg-room">Số phòng</label>
          <input type="text" id="reg-room" placeholder="VD: 104-A" required>
        </div>
        <div class="field">
          <label for="reg-phone">Số điện thoại</label>
          <input type="tel" id="reg-phone" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" placeholder="VD: 0987654321" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Tạo tài khoản</button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
